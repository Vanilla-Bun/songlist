name: Update Songlist

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest export.json
        run: |
          curl -fL "https://api.streamersonglist.com/v1/streamers/39650/songs/export" -o temp.json
          jq empty temp.json

          TIMESTAMP=$(date +%s)
          jq --argjson ver "$TIMESTAMP" '. + {"_version": $ver}' temp.json > export.json
          rm temp.json

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          MSK_TIME=$(TZ='Europe/Moscow' date '+%d.%m.%Y %H:%M')

          git add export.json
          git diff --cached --quiet && echo "Нет изменений" && exit 0

          git commit -m "Обновлён $MSK_TIME (МСК) [skip ci]"
          git push
