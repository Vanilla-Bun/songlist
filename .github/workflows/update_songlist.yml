name: Update Songlist

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest export.json
        run: |
          curl -L "https://api.streamersonglist.com/v1/streamers/39650/songs/export" -o export.json

      - name: Commit and Push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if git diff --exit-code export.json > /dev/null; then
            echo "Данные совпадают"
          else
            echo "Обновляем данные"
            MSK_TIME=$(TZ='Europe/Moscow' date '+%d.%m.%Y %H:%M')
            git add export.json
            git commit -m "Обновлён $MSK_TIME (МСК) [skip ci]"
            git push
          fi
